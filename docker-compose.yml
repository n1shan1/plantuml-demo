version: '3.8'

services:
  architecture-diagram-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arch-diagram-generator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/diagram/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
